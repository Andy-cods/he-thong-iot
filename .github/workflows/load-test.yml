name: Load Test V1.4

# Trigger:
#  - Thủ công qua UI (workflow_dispatch) — cho phép override BASE_URL
#  - Weekly: Chủ Nhật 04:00 UTC = 11:00 VN, xưởng không ca
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (override LOAD_TEST_URL secret)"
        required: false
        default: ""
      user_count:
        description: "Số user seed (default 100)"
        required: false
        default: "100"
  schedule:
    - cron: "0 4 * * 0"

jobs:
  k6:
    name: k6 100 VU × 5 endpoint × 5m
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install k6 (macOS)
        run: brew install k6

      - name: Resolve target URL
        id: url
        run: |
          if [[ -n "${{ github.event.inputs.target_url }}" ]]; then
            echo "base_url=${{ github.event.inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            echo "base_url=${{ secrets.LOAD_TEST_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Install project deps (chỉ @iot/db cho seed script)
        run: pnpm install --frozen-lockfile

      - name: Seed 100 test users
        env:
          DATABASE_URL: ${{ secrets.LOAD_TEST_DATABASE_URL }}
          LOAD_TEST_PASSWORD: ${{ secrets.LOAD_TEST_PASSWORD }}
          USER_COUNT: ${{ github.event.inputs.user_count || '100' }}
        # Chỉ chạy nếu có DATABASE_URL secret — staging thật. Không thì
        # skip (cho phép test ở ENV demo đã có user).
        run: |
          if [[ -n "$DATABASE_URL" ]]; then
            pnpm tsx tests/load/setup-test-users.ts
          else
            echo "LOAD_TEST_DATABASE_URL chưa set → skip seed (assume user đã tồn tại)"
          fi

      - name: Run k6 load test
        env:
          LOAD_TEST_URL: ${{ steps.url.outputs.base_url }}
          LOAD_TEST_PASSWORD: ${{ secrets.LOAD_TEST_PASSWORD }}
          USER_COUNT: ${{ github.event.inputs.user_count || '100' }}
        run: |
          k6 run \
            --out json=result.json \
            --summary-export=summary.json \
            tests/load/v1.4-load.js \
            | tee k6-output.txt

      - name: Generate HTML report
        if: always()
        run: |
          npm install -g @k6-io/k6-html-reporter || npm install -g k6-html-reporter
          node -e "
            const { generateSummaryReport } = require('k6-html-reporter');
            generateSummaryReport({ jsonFile: 'summary.json', output: '.' });
          " || echo "Fallback: copy k6-output.txt làm report"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-${{ github.run_id }}
          path: |
            result.json
            summary.json
            k6-output.txt
            *.html
          retention-days: 30
          if-no-files-found: warn
