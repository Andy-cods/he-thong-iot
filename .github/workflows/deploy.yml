name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: andy-cods/hethong-iot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u andy-cods --password-stdin
            cd /opt/hethong-iot
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker compose up -d --force-recreate app worker
            docker compose exec -T app sh -c 'cd /app && node -e "
              const { drizzle } = require(\"drizzle-orm/node-postgres\");
              const { migrate } = require(\"drizzle-orm/node-postgres/migrator\");
              const { Pool } = require(\"pg\");
              const pool = new Pool({ connectionString: process.env.DATABASE_URL });
              const db = drizzle(pool);
              migrate(db, { migrationsFolder: \"packages/db/drizzle\" }).then(() => { console.log(\"Migrate OK\"); pool.end(); }).catch(e => { console.error(e); process.exit(1); });
            "' || true
            docker image prune -f
            echo "Deploy done: $(date)"
